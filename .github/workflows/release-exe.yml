name: Manual Portable Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate required build configuration
        shell: pwsh
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL }}
        run: |
          $required = 'VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY', 'VITE_PUBLIC_APP_URL'
          $missing = $required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) }
          if ($missing) {
            throw "Missing required build configuration: $($missing -join ', ')"
          }
          $publicAppUrl = [Uri]$env:VITE_PUBLIC_APP_URL
          if ($publicAppUrl.Scheme -ne 'https' -or $publicAppUrl.UserInfo -or $publicAppUrl.Query -or $publicAppUrl.Fragment) {
            throw 'VITE_PUBLIC_APP_URL must be a public https base URL without credentials, query, or hash'
          }

      - name: Build single portable executable
        run: npm run electron:build:portable
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL }}

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: troiareuke-crm-portable-${{ github.sha }}
          path: release/트로이아르케 CRM.exe
          if-no-files-found: error
          retention-days: 14
