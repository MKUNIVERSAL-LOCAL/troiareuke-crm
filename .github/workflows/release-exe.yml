name: Manual Portable Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build single portable executable
        run: npm run electron:build:portable
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: troiareuke-crm-portable-${{ github.sha }}
          path: release/트로이아르케 CRM.exe
          if-no-files-found: error
          retention-days: 14
