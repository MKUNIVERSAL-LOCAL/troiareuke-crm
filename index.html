    <title>트로이아르케 CRM</title>
    <script>
      // GitHub Pages 404.html이 query string으로 보존한 SPA 경로를 복원한다.
      (function (location) {
        if (location.search.startsWith('?/')) {
          var decoded = location.search
            .slice(2)
            .split('&')
            .map(function (part) { return part.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(null, '', location.pathname.replace(/\/$/, '') + '/' + decoded + location.hash);
        }
      })(window.location);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
