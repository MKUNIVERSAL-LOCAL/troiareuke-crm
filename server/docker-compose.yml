services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_auth
      POSTGRES_USER: crm_auth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - crm_auth_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_auth -d crm_auth"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-api:
    build: .
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      RESET_TOKEN_MINUTES: ${RESET_TOKEN_MINUTES:-30}
      ALLOW_PUBLIC_SIGNUP: ${ALLOW_PUBLIC_SIGNUP:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMS_PROVIDER: ${SMS_PROVIDER:-none}
      SMS_HTTP_URL: ${SMS_HTTP_URL}
      SMS_HTTP_KEY: ${SMS_HTTP_KEY}
      SMS_SENDER_ID: ${SMS_SENDER_ID}
      MESSAGE_HOURLY_LIMIT: ${MESSAGE_HOURLY_LIMIT:-500}
      REMINDER_ENABLED: ${REMINDER_ENABLED:-false}
      REMINDER_HOUR: ${REMINDER_HOUR:-10}
      REMINDER_CYCLE_DAYS: ${REMINDER_CYCLE_DAYS:-28}
      REMINDER_COOLDOWN_DAYS: ${REMINDER_COOLDOWN_DAYS:-7}
      BACKUP_DIR: /backup
      BACKUP_HOUR: ${BACKUP_HOUR:-4}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
      TZ: Asia/Seoul
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
    volumes:
      # File Station의 CRM-BACKUP 공유폴더 — 지점별/날짜별 백업이 여기 쌓인다
      - ${BACKUP_HOST_DIR:-/volume1/CRM-BACKUP}/troiareuke-crm:/backup
    ports:
      - "8787:8787"

volumes:
  crm_auth_database:
